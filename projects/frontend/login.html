<!DOCTYPE html>
<html lang="es">
   <head>
      <meta charset="UTF-8" />
      <meta name="viewport" content="width=device-width, initial-scale=1" />
      <title>Gaia - Bienvenido</title>
      <link rel="stylesheet" href="styles.css" />
      <script src="api-bases.js"></script>
   </head>
   <body>
      <div class="login-container">
         <div class="login-card">
            <h1 class="login-title">🌱 Gaia</h1>
            <p class="login-subtitle">Identificador de plantas con IA</p>
            <form id="login-form">
               <input
                  type="text"
                  id="username-input"
                  class="login-input"
                  placeholder="¿Cómo te llamas?"
                  required
                  autocomplete="off"
               />
               <button type="submit" class="login-btn">Continuar</button>
            </form>
         </div>
      </div>
      <script src="login.js"></script>
   </body>
</html>
